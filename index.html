<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AI Control Dashboard - IoT</title>
    <style>
        body { font-family: Arial, sans-serif; text-align: center; background-color: #2c3e50; color: white; padding: 20px; }
        #webcam-container { margin: 20px auto; border: 5px solid #34495e; border-radius: 10px; display: inline-block; overflow: hidden;}
        #label-container { font-size: 24px; font-weight: bold; margin-top: 20px; color: #1abc9c; }
        .btn { padding: 10px 20px; font-size: 18px; cursor: pointer; background-color: #e74c3c; color: white; border: none; border-radius: 5px; }
        .btn:hover { background-color: #c0392b; }
        #status { margin-top: 15px; font-size: 16px; color: #f1c40f; }
    </style>
</head>
<body>

    <h2>Hệ thống nhận diện cử chỉ (AI to IoT)</h2>
    <button class="btn" type="button" onclick="init()">BẬT CAMERA & BẮT ĐẦU</button>
    
    <div id="webcam-container"></div>
    <div id="label-container">Đang chờ khởi động...</div>
    <div id="status">Trạng thái gửi lệnh Adafruit: Chờ...</div>

    <script src="https://cdn.jsdelivr.net/npm/@tensorflow/tfjs@latest/dist/tf.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/@teachablemachine/image@latest/dist/teachablemachine-image.min.js"></script>
    
    <script type="text/javascript">
        // ==========================================
        // VÙNG CẤU HÌNH THÔNG TIN CỦA BẠN
        // ==========================================
        const URL = "https://teachablemachine.withgoogle.com/models/R1MqZoKvq/"; // Dạng: https://teachablemachine.withgoogle.com/models/abcxyz/
        const AIO_USERNAME = "tuannha090";
        const AIO_KEY = "aio_nDId93EPFXCwsi2zzn9qGO5FM4FO";
        // ==========================================

        let model, webcam, labelContainer, maxPredictions;
        let lastAction = "None"; // Biến lưu trạng thái cuối để tránh spam API Adafruit

        async function init() {
            const modelURL = URL + "model.json";
            const metadataURL = URL + "metadata.json";

            document.getElementById("label-container").innerText = "Đang tải Model AI...";
            
            // Load model AI
            model = await tmImage.load(modelURL, metadataURL);
            maxPredictions = model.getTotalClasses();

            // Setup Webcam
            const flip = true; 
            webcam = new tmImage.Webcam(400, 400, flip); 
            await webcam.setup(); 
            await webcam.play();
            window.requestAnimationFrame(loop);

            // Gắn webcam lên web
            document.getElementById("webcam-container").appendChild(webcam.canvas);
            labelContainer = document.getElementById("label-container");
        }

        async function loop() {
            webcam.update(); 
            await predict();
            window.requestAnimationFrame(loop);
        }

        async function predict() {
            const prediction = await model.predict(webcam.canvas);
            let highestProb = 0;
            let bestClass = "";

            // Tìm hành động có xác suất cao nhất
            for (let i = 0; i < maxPredictions; i++) {
                if (prediction[i].probability > highestProb) {
                    highestProb = prediction[i].probability;
                    bestClass = prediction[i].className;
                }
            }

            // Hiển thị ra màn hình web
            labelContainer.innerText = `Nhận diện: ${bestClass} (${Math.round(highestProb * 100)}%)`;

            // LOGIC GỬI LỆNH LÊN ADAFRUIT (Chỉ gửi khi chắc chắn > 85% và trạng thái thay đổi để tránh vượt quá giới hạn free API)
            if (highestProb > 0.85) {
                if (bestClass === "Like" && lastAction !== "Like") {
                    document.getElementById("status").innerText = "Đang gửi lệnh: BẬT (1) ...";
                    sendToAdafruit("feed-led", "1");
                    sendToAdafruit("feed-dht22-switch", "1");
                    lastAction = "Like";
                } 
                else if (bestClass === "Dislike" && lastAction !== "Dislike") {
                    document.getElementById("status").innerText = "Đang gửi lệnh: TẮT (0) ...";
                    sendToAdafruit("feed-led", "0");
                    sendToAdafruit("feed-dht22-switch", "0");
                    lastAction = "Dislike";
                }
                else if (bestClass === "None") {
                    // Trả về trạng thái None để cho phép nhận lệnh tiếp theo
                    lastAction = "None"; 
                    document.getElementById("status").innerText = "Trạng thái tĩnh. Đang chờ hành động...";
                }
            }
        }

        // Hàm gọi API Adafruit để đẩy dữ liệu
        function sendToAdafruit(feedName, value) {
            const apiURL = `https://io.adafruit.com/api/v2/${AIO_USERNAME}/feeds/${feedName}/data`;
            
            fetch(apiURL, {
                method: "POST",
                headers: {
                    "X-AIO-Key": AIO_KEY,
                    "Content-Type": "application/json"
                },
                body: JSON.stringify({
                    "datum": { "value": value }
                })
            })
            .then(response => {
                if(response.ok) {
                    console.log(`Đã gửi ${value} lên ${feedName} thành công!`);
                    document.getElementById("status").innerText = `Đã cập nhật Adafruit: ${value === "1" ? "ON" : "OFF"}`;
                } else {
                    console.error("Lỗi gửi dữ liệu lên Adafruit");
                }
            })
            .catch(error => console.error("Lỗi API:", error));
        }
    </script>
</body>
</html>
